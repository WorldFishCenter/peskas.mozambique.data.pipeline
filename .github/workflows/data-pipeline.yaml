name: Peskas Mozambique Data Pipeline
'on':
  push:
  schedule:
    - cron: 0 0 */2 * *

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
  GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
  KOBO_TOKEN: ${{ secrets.KOBO_TOKEN }}
  KOBO_ASSET_ID_LURIO: ${{ secrets.KOBO_ASSET_ID_LURIO }}
  KOBO_ASSET_ID_ADNAP: ${{ secrets.KOBO_ASSET_ID_ADNAP }}
  KOBO_PASSWORD: ${{ secrets.KOBO_PASSWORD }}
  KOBO_USERNAME: ${{ secrets.KOBO_USERNAME }}
  MONGODB_CONNECTION_STRING: ${{ secrets.MONGODB_CONNECTION_STRING }}
  MONGODB_CONNECTION_STRING_VALIDATION: ${{ secrets.MONGODB_CONNECTION_STRING_VALIDATION }}
  AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
  AIRTABLE_BASE_ID_FRAME: ${{ secrets.AIRTABLE_BASE_ID_FRAME }}
  PDS_TOKEN: ${{ secrets.PDS_TOKEN }}
  PDS_SECRET: ${{ secrets.PDS_SECRET }}

jobs:
  build-container:
    name: Build R container
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve latest peskas.coasts release
        id: coasts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ref=$(gh api repos/WorldFishCenter/peskas.coasts/releases/latest --jq .tag_name)
          if [ -z "$ref" ] || [ "$ref" = "null" ]; then
            echo "Failed to resolve latest peskas.coasts release" >&2
            exit 1
          fi
          echo "ref=$ref" >> "$GITHUB_OUTPUT"
          echo "Resolved peskas.coasts ref: $ref"
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.prod
          push: true
          build-args: |
            COASTS_REF=${{ steps.coasts.outputs.ref }}
          tags: ghcr.io/worldfishcenter/peskas.mozambique.data.pipeline/r-runner-peskas-mozambique:latest
          build-args: CACHEBUST=${{ github.sha }}
          cache-from: type=registry,ref=ghcr.io/worldfishcenter/peskas.mozambique.data.pipeline/r-runner-peskas-mozambique:buildcache
          cache-to: type=registry,ref=ghcr.io/worldfishcenter/peskas.mozambique.data.pipeline/r-runner-peskas-mozambique:buildcache,mode=max


  ingest-preprocess-lurio:
    container:
      credentials:
        password: ${{ secrets.GITHUB_TOKEN }}
        username: ${{ github.actor }}
      image: ghcr.io/worldfishcenter/peskas.mozambique.data.pipeline/r-runner-peskas-mozambique:latest
    name: Ingest and preprocess Lurio landings
    needs: build-container
    runs-on: ubuntu-latest
    steps:
      - if: endsWith(github.ref, '/main')
        name: Set env to production
        run: echo "R_CONFIG_ACTIVE=production" >> $GITHUB_ENV
      - name: Call ingest_landings_lurio()
        run: Rscript -e 'peskas.mozambique.data.pipeline::ingest_landings_lurio()'
      - name: Call preprocess_landings_lurio()
        run: Rscript -e 'peskas.mozambique.data.pipeline::preprocess_landings_lurio()'

  ingest-preprocess-adnap:
    container:
      credentials:
        password: ${{ secrets.GITHUB_TOKEN }}
        username: ${{ github.actor }}
      image: ghcr.io/worldfishcenter/peskas.mozambique.data.pipeline/r-runner-peskas-mozambique:latest
    name: Ingest and preprocess ADNAP landings
    needs: build-container
    runs-on: ubuntu-latest
    steps:
      - if: endsWith(github.ref, '/main')
        name: Set env to production
        run: echo "R_CONFIG_ACTIVE=production" >> $GITHUB_ENV
      - name: Call ingest_landings_adnap()
        run: Rscript -e 'peskas.mozambique.data.pipeline::ingest_landings_adnap()'
      - name: Call preprocess_landings_adnap()
        run: Rscript -e 'peskas.mozambique.data.pipeline::preprocess_landings_adnap()'

  ingest-preprocess-pds:
    container:
      credentials:
        password: ${{ secrets.GITHUB_TOKEN }}
        username: ${{ github.actor }}
      image: ghcr.io/worldfishcenter/peskas.mozambique.data.pipeline/r-runner-peskas-mozambique:latest
    name: Ingest and preprocess GPS data
    needs: build-container
    runs-on: ubuntu-24.04
    steps:
      - if: endsWith(github.ref, '/main')
        name: Set env to production
        run: echo "R_CONFIG_ACTIVE=production" >> $GITHUB_ENV
      - name: Call ingest_pds_trips()
        run: Rscript --vanilla -e 'coasts::ingest_pds_trips(package = "peskas.mozambique.data.pipeline")'
      - name: Call ingest_pds_tracks()
        run: Rscript --vanilla -e 'coasts::ingest_pds_tracks(package = "peskas.mozambique.data.pipeline")'
      - name: Call preprocess_pds_tracks()
        run: Rscript --vanilla -e 'coasts::preprocess_pds_tracks(package = "peskas.mozambique.data.pipeline")'

  validate-lurio:
    container:
      credentials:
        password: ${{ secrets.GITHUB_TOKEN }}
        username: ${{ github.actor }}
      image: ghcr.io/worldfishcenter/peskas.mozambique.data.pipeline/r-runner-peskas-mozambique:latest
    name: Validate Lurio landings
    needs: ingest-preprocess-lurio
    runs-on: ubuntu-latest
    steps:
      - if: endsWith(github.ref, '/main')
        name: Set env to production
        run: echo "R_CONFIG_ACTIVE=production" >> $GITHUB_ENV
      - name: Call validate_surveys_lurio()
        run: Rscript -e 'peskas.mozambique.data.pipeline::validate_surveys_lurio()'

  validate-adnap:
    container:
      credentials:
        password: ${{ secrets.GITHUB_TOKEN }}
        username: ${{ github.actor }}
      image: ghcr.io/worldfishcenter/peskas.mozambique.data.pipeline/r-runner-peskas-mozambique:latest
    name: Validate ADNAP landings
    needs: ingest-preprocess-adnap
    runs-on: ubuntu-latest
    steps:
      - if: endsWith(github.ref, '/main')
        name: Set env to production
        run: echo "R_CONFIG_ACTIVE=production" >> $GITHUB_ENV
      - name: Call validate_surveys_adnap()
        run: Rscript -e 'peskas.mozambique.data.pipeline::validate_surveys_adnap()'

  merge-trips-adnap:
    container:
      credentials:
        password: ${{ secrets.GITHUB_TOKEN }}
        username: ${{ github.actor }}
      image: ghcr.io/worldfishcenter/peskas.mozambique.data.pipeline/r-runner-peskas-mozambique:latest
    name: Merge PDS and surveys data
    needs: [validate-adnap, ingest-preprocess-pds]
    runs-on: ubuntu-latest
    steps:
      - if: endsWith(github.ref, '/main')
        name: Set env to production
        run: echo "R_CONFIG_ACTIVE=production" >> $GITHUB_ENV
      - name: Call merge_trips()
        run: Rscript -e 'peskas.mozambique.data.pipeline::merge_trips()'

  export-api-raw:
    container:
      credentials:
        password: ${{ secrets.GITHUB_TOKEN }}
        username: ${{ github.actor }}
      image: ghcr.io/worldfishcenter/peskas.mozambique.data.pipeline/r-runner-peskas-mozambique:latest
    name: Export ADNAP raw API landings
    needs: ingest-preprocess-adnap
    runs-on: ubuntu-latest
    steps:
      - if: endsWith(github.ref, '/main')
        name: Set env to production
        run: echo "R_CONFIG_ACTIVE=production" >> $GITHUB_ENV
      - name: Call export_api_raw()
        run: Rscript -e 'peskas.mozambique.data.pipeline::export_api_raw()'

  export-api-validated:
    container:
      credentials:
        password: ${{ secrets.GITHUB_TOKEN }}
        username: ${{ github.actor }}
      image: ghcr.io/worldfishcenter/peskas.mozambique.data.pipeline/r-runner-peskas-mozambique:latest
    name: Export ADNAP validated API landings
    needs: validate-adnap
    runs-on: ubuntu-latest
    steps:
      - if: endsWith(github.ref, '/main')
        name: Set env to production
        run: echo "R_CONFIG_ACTIVE=production" >> $GITHUB_ENV
      - name: Call export_api_validated()
        run: Rscript -e 'peskas.mozambique.data.pipeline::export_api_validated()'

  summarize-model-data:
    name: Summarize and model validated data
    needs: [export-api-validated, ingest-preprocess-pds]
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/worldfishcenter/peskas.mozambique.data.pipeline/r-runner-peskas-mozambique:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Set env to production
        if: endsWith(github.ref, '/main')
        run: echo "R_CONFIG_ACTIVE=production" >> $GITHUB_ENV
      - name: Call summarize_data()
        run: Rscript -e 'coasts::summarize_data(package = "peskas.mozambique.data.pipeline")'
      - name: Call generate_fleet_analysis()
        run: Rscript -e 'coasts::generate_fleet_analysis(package = "peskas.mozambique.data.pipeline")'

  export-surveys-portal:
    name: Export aggregated data
    needs: summarize-model-data
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/worldfishcenter/peskas.mozambique.data.pipeline/r-runner-peskas-mozambique:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Set env to production
        if: endsWith(github.ref, '/main')
        run: echo "R_CONFIG_ACTIVE=production" >> $GITHUB_ENV
      - name: Call export_portal()
        run: Rscript -e 'coasts::export_portal(package = "peskas.mozambique.data.pipeline")'

  export-lurio-data:
    name: Export Lurio data
    needs: validate-lurio
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/worldfishcenter/peskas.mozambique.data.pipeline/r-runner-peskas-mozambique:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Set env to production
        if: endsWith(github.ref, '/main')
        run: echo "R_CONFIG_ACTIVE=production" >> $GITHUB_ENV
      - name: Call export_lurio_landings()
        run: Rscript -e 'peskas.mozambique.data.pipeline::export_lurio_landings()'